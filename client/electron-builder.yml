appId: pro.cryptoclaw.client
productName: CryptoQClaw
copyright: Copyright © 2026 CryptoQClaw Team

directories:
  output: dist
  buildResources: resources

files:
  - src/**/*
  - public/**/*
  - package.json
  - "!node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}"
  - "!node_modules/.cache/*"

extraResources:
  - from: resources
    to: resources

mac:
  category: public.app-category.finance
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerSidebar: resources/sidebar.bmp
  license: ../LICENSE
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: resources/icons
  category: Office
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64

appImage:
  systemIntegration: ask

deb:
  priority: optional
  compression: xz

publish:
  provider: github
  owner: franklili3
  repo: CryptoQClaw
  releaseType: release

autoUpdate:
  checkUpdateOnStart: true
  autoDownload: true
