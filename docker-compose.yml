# CryptoClaw Docker Compose 配置
# 
# 使用方法:
#   1. 复制配置文件: cp .env.example .env
#   2. 编辑 .env 文件，填写实际值
#   3. 启动服务: docker-compose up -d
#
# 注意: 如需访问 Binance 等需要代理的 API，请使用 host 网络模式:
#   docker-compose -f docker-compose.yml -f docker-compose.hostnet.yml up -d

version: '3.8'

services:
  cryptoclaw:
    image: cryptoclaw/cryptoclaw:latest
    container_name: cryptoclaw
    restart: unless-stopped
    
    # 网络模式: bridge (默认) 或 host (需要代理时使用)
    # network_mode: host
    
    ports:
      - "${GATEWAY_PORT:-19001}:19001"
    
    environment:
      # 基础配置
      - NODE_ENV=production
      - PORT=3000
      - TZ=${TZ:-Asia/Shanghai}
      
      # Telegram Bot 配置
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      
      # LLM 配置
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      
      # 自定义 LLM 提供商配置 (可选)
      # 当 LLM_PROVIDER=custom 时使用
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_VERSION=${LLM_API_VERSION:-}
      
      # OpenClaw 配置
      - OPENCLAW_CONFIG=/app/config/openclaw.yaml
      - OPENCLAW_WORKSPACE=/app/workspace
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
      
      # 交易所 API 配置 (可选，用于实盘交易)
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE:-}
      
      # Freqtrade 配置 (可选，用于与 Freqtrade 交互)
      # Freqtrade 是开源软件，通过 JSON-RPC 或 REST API 交互
      - FREQTRADE_URL=${FREQTRADE_URL:-http://localhost:8080}
      # JSON-RPC 配置 (可选，用于带密码保护的 Freqtrade)
      - FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-}
      - FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD:-}
    
    volumes:
      # 持久化数据
      - cryptoclaw-data:/app/data
      - cryptoclaw-logs:/app/logs
      - cryptoclaw-workspace:/app/workspace
      
      # 配置文件 (可选，用于自定义配置)
      # - ./config/openclaw.yaml:/app/config/openclaw.yaml:ro
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cryptoclaw-data:
    name: cryptoclaw-data
  cryptoclaw-logs:
    name: cryptoclaw-logs
  cryptoclaw-workspace:
    name: cryptoclaw-workspace
